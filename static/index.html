<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Dashboard - Bad Word Penalty Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="container flex-between">
            <div class="brand">
                <div class="logo-circle">₹</div>
                <h1 class="brand-title">Gali Penalty Tracker</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">Dashboard</a>
                <a href="leaderboard.html" class="nav-link">Leaderboard</a>
                <a href="transactions.html" class="nav-link">Logs</a>
                <a href="#" class="nav-link" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Financial Summary card -->
        <div class="summary-card">
            <div class="summary-item">
                <h4>Total Collected Money</h4>
                <div class="amount" id="totalCollectedText" style="color: #10b981;">₹0</div>
            </div>
            <div class="summary-item">
                <h4>Total Pending Money</h4>
                <div class="amount" id="totalPendingText" style="color: #ef4444;">₹0</div>
            </div>
            <div class="summary-item">
                <h4>Money Receiver</h4>
                <div class="receiver-name">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <span>Krishiv</span>
                </div>
            </div>
            <div class="summary-actions">
                <button class="btn btn-primary" onclick="openAddFineModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14m-7-7v14"/>
                    </svg>
                    <span>Add / Deduct / Pay</span>
                </button>
            </div>
        </div>

        <!-- Members Grid Area -->
        <div class="card">
            <div class="card-header">
                <div>
                    <h3 class="card-title">Group Members</h3>
                    <p class="card-subtitle">Perform actions instantly on any group member</p>
                </div>
                <button class="btn btn-outline btn-danger" onclick="confirmResetAll()">Reset All Data</button>
            </div>
            <div class="members-grid" id="membersGrid">
                <!-- Dynamically populated via script -->
            </div>
        </div>
    </main>

    <!-- Modal Backdrop -->
    <div class="modal-backdrop" id="fineModalBackdrop" onclick="closeAddFineModalOnBackdrop(event)">
        <div class="modal" id="fineModal">
            <div class="modal-header">
                <h3 class="modal-title">Record Action</h3>
                <button class="modal-close" onclick="closeAddFineModal()">&times;</button>
            </div>
            <form id="addFineForm" onsubmit="submitFineForm(event)">
                <div class="form-group">
                    <label class="form-label" for="memberSelect">Select Member</label>
                    <select class="form-select" id="memberSelect" required>
                        <option value="" disabled selected>Choose a member</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="actionSelect">Select Action</label>
                    <select class="form-select" id="actionSelect" required>
                        <option value="add" selected>Add Fine</option>
                        <option value="pay">Pay Fine</option>
                        <option value="deduct">Deduct Fine</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="amountSelect">Select Amount</label>
                    <select class="form-select" id="amountSelect" required>
                        <option value="10" selected>₹10</option>
                        <option value="5">₹5</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="closeAddFineModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Submit Action</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Auth check
        const userRole = localStorage.getItem('userRole');
        if (!userRole) {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('userRole');
            window.location.href = 'login.html';
        }

        let members = [];

        async function fetchApp() {
            try {
                const res = await fetch('/api/members');
                members = await res.json();
                renderMembers();
                applyRoleRestrictions();
            } catch (e) {
                console.error("Failed to load members", e);
            }
        }

        function applyRoleRestrictions() {
            if (userRole === 'user') {
                // Hide all admin-only elements
                const adminOnly = document.querySelectorAll('.summary-actions, .btn-danger, .member-card-actions');
                adminOnly.forEach(el => el.style.display = 'none');
                
                // Also update subtitle
                const subtitle = document.querySelector('.card-subtitle');
                if (subtitle) subtitle.textContent = 'View real-time penalty stats for all members';
            }
        }

        function renderMembers() {
            let totalPending = 0;
            let totalCollected = 0;
            const grid = document.getElementById('membersGrid');
            grid.innerHTML = '';
            
            // Sync select
            const selectEl = document.getElementById('memberSelect');
            if (selectEl) {
                selectEl.innerHTML = '<option value="" disabled selected>Choose a member</option>';
            }

            members.forEach(m => {
                totalPending += m.totalFine;
                totalCollected += (m.paidFine || 0);
                
                if (selectEl) {
                    const opt = document.createElement('option');
                    opt.value = m.name;
                    opt.textContent = m.name;
                    selectEl.appendChild(opt);
                }

                const html = `
                    <div class="member-card">
                        <div class="member-card-top" style="flex-direction: column; gap: 8px;">
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: baseline;">
                                <h4 class="member-card-title">${m.name}</h4>
                                <span style="font-size: 0.8rem; background-color: var(--border-color); padding: 4px 8px; border-radius: 6px; color: #94a3b8;">${m.violations} violation${m.violations === 1 ? '' : 's'}</span>
                            </div>
                            <div style="display: flex; gap: 16px; margin-top: 4px; font-size: 0.9rem;">
                                <span style="color: #94a3b8;">Pending: <strong style="color: #ef4444;">₹${m.totalFine}</strong></span>
                                <span style="color: #94a3b8;">Paid: <strong style="color: #10b981;">₹${m.paidFine || 0}</strong></span>
                            </div>
                        </div>
                        <div class="member-card-actions" style="display: flex; gap: 4px; margin-top: 12px;">
                            <button class="btn btn-outline" style="padding: 6px 8px; font-size: 0.75rem; flex: 1; border-color: #3b82f6;" onclick="quickAction('${m.name}', 'add')" title="Quick Add Fine">Add</button>
                            <button class="btn btn-outline" style="padding: 6px 8px; font-size: 0.75rem; flex: 1; background-color: #10b981; color: white; border-color: #059669;" onclick="quickAction('${m.name}', 'pay')" title="Quick Mark as Paid">Pay</button>
                            <button class="btn btn-outline" style="padding: 6px 8px; font-size: 0.75rem; flex: 1;" onclick="quickAction('${m.name}', 'deduct')" title="Quick Deduct">Deduct</button>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', html);
            });
            
            document.getElementById('totalPendingText').textContent = `₹${totalPending}`;
            document.getElementById('totalCollectedText').textContent = `₹${totalCollected}`;
            
            // Re-apply restrictions after rendering
            applyRoleRestrictions();
        }

        async function quickAction(name, action, amount = 10) {
            if (userRole !== 'admin') {
                alert("Unauthorized: Only admins can perform actions.");
                return;
            }
            try {
                const res = await fetch('/api/action', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, action, amount: parseInt(amount)})
                });
                if (!res.ok) {
                    const err = await res.json();
                    alert(err.detail || "Operation failed");
                    return;
                }
                fetchApp();
            } catch (e) {
                console.error(e);
            }
        }

        function openAddFineModal() { 
            if (userRole !== 'admin') return;
            document.getElementById('fineModalBackdrop').classList.add('active'); 
        }
        function closeAddFineModal() { document.getElementById('fineModalBackdrop').classList.remove('active'); document.getElementById('addFineForm').reset(); }
        function closeAddFineModalOnBackdrop(e) { if (e.target.id === 'fineModalBackdrop') closeAddFineModal(); }

        async function submitFineForm(e) {
            e.preventDefault();
            const name = document.getElementById('memberSelect').value;
            const action = document.getElementById('actionSelect').value;
            const amount = document.getElementById('amountSelect').value;
            if (name && action) {
                await quickAction(name, action, amount);
                closeAddFineModal();
            }
        }

        async function confirmResetAll() {
            if (userRole !== 'admin') return;
            if (confirm("Reset everything in SQLite? This action cannot be undone.")) {
                await fetch('/api/reset', {method: 'POST'});
                fetchApp();
            }
        }

        window.addEventListener('load', () => {
            fetchApp();
            setInterval(fetchApp, 5000); // Increased interval to reduce load
        });
    </script>
</body>
</html>
